            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        function initTheme() {
            const savedTheme = localStorage.getItem('ai-agent-book-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);
        }

        function updateThemeButton(theme) {
            if (theme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = '浅色';
                hljsDark.disabled = false;
                hljsLight.disabled = true;
            } else {
                themeIcon.textContent = '🌙';
                themeText.textContent = '深色';
                hljsDark.disabled = true;
                hljsLight.disabled = false;
            }
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('ai-agent-book-theme', newTheme);
            updateThemeButton(newTheme);
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        });

        function renderNav() {
            navList.innerHTML = chapters.map((chapter, index) => 
                `<li class="nav-item">
                    <a class="nav-link ${index === currentChapter ? 'active' : ''}" data-index="${index}">${chapter.title}</a>
                </li>`
            ).join('');
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    navigateToChapter(index);
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('active');
                });
            });
        }

        function renderChapter(index) {
            const chapter = chapters[index];
            let html = marked.parse(chapter.content);
            
            html = applyHighlights(html, chapter.id);
            
            let navHtml = '<div class="chapter-nav">';
            if (index > 0) {
                navHtml += `<button class="chapter-nav-btn prev" data-nav="prev"><span class="chapter-nav-label">← 上一章</span><span class="chapter-nav-title">${chapters[index-1].title}</span></button>`;
            } else {
                navHtml += '<div></div>';
            }
            if (index < chapters.length - 1) {
                navHtml += `<button class="chapter-nav-btn next" data-nav="next"><span class="chapter-nav-label">下一章 →</span><span class="chapter-nav-title">${chapters[index+1].title}</span></button>`;
            }
            navHtml += '</div>';
            
            content.innerHTML = `<section class="chapter active" data-chapter-id="${chapter.id}"><div class="chapter-card"><div class="markdown-body">${html}</div>${navHtml}</div></section>`;
            
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            document.querySelectorAll('[data-nav]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const direction = btn.dataset.nav;
                    if (direction === 'prev' && currentChapter > 0) {
                        navigateToChapter(currentChapter - 1);
                    } else if (direction === 'next' && currentChapter < chapters.length - 1) {
                        navigateToChapter(currentChapter + 1);
                    }
                });
            });

            setupHighlightClickHandlers();
            window.scrollTo(0, 0);
        }

        function applyHighlights(html, chapterId) {
            const chapterHighlights = highlights[chapterId] || [];
            if (chapterHighlights.length === 0) return html;
            
            chapterHighlights.forEach(h => {
                const colorClass = `highlight-${h.color}`;
                const regex = new RegExp(`(${escapeRegExp(h.text)})`, 'g');
                html = html.replace(regex, `<mark class="${colorClass}" data-highlight-id="${h.id}">$1</mark>`);
            });
            
            return html;
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function setupHighlightClickHandlers() {
            document.querySelectorAll('mark[class^="highlight-"]').forEach(mark => {
                mark.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('删除这个高亮标记？')) {
                        const highlightId = mark.dataset.highlightId;
                        const chapterId = document.querySelector('.chapter.active').dataset.chapterId;
                        removeHighlight(chapterId, highlightId);
                        renderChapter(currentChapter);
                    }
                });
            });
        }

        function navigateToChapter(index) {
            currentChapter = index;
            window.location.hash = `chapter-${index}`;
            
            document.querySelectorAll('.nav-link').forEach((link, i) => {
                link.classList.toggle('active', i === index);
            });
            
            const oldChapter = document.querySelector('.chapter.active');
            if (oldChapter) {
                oldChapter.style.opacity = '0';
                oldChapter.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    renderChapter(index);
                }, 200);
            } else {
                renderChapter(index);
            }
        }

        function handleHashChange() {
            const hash = window.location.hash.slice(1);
            const match = hash.match(/^chapter-(\d+)$/);
            if (match) {
                const index = parseInt(match[1]);
                if (index >= 0 && index < chapters.length && index !== currentChapter) {
                    currentChapter = index;
                    renderNav();
                    renderChapter(index);
                }
            }
        }

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        });

        function updateProgress() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            progressBar.style.width = scrolled + '%';
            
            if (winScroll > 300) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        }

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        let selectedText = '';
        let selectedRange = null;

        document.addEventListener('mouseup', (e) => {
            if (e.target.closest('.highlight-toolbar')) return;
            
            setTimeout(() => {
                const selection = window.getSelection();
                const text = selection.toString().trim();
                
                if (text.length > 0 && text.length < 500) {
                    const range = selection.getRangeAt(0);
                    const container = range.commonAncestorContainer;
                    const contentContainer = document.getElementById('content');
                    
                    if (contentContainer.contains(container)) {
                        selectedText = text;
                        selectedRange = range.cloneRange();
                        
                        const rect = range.getBoundingClientRect();
                        showHighlightToolbar(rect);
                    } else {
                        hideHighlightToolbar();
                    }
                } else {
                    hideHighlightToolbar();
                }
            }, 10);
        });

        document.addEventListener('mousedown', (e) => {
            if (!e.target.closest('.highlight-toolbar')) {
                hideHighlightToolbar();
            }
        });

        function showHighlightToolbar(rect) {
            const toolbarWidth = 200;
            const toolbarHeight = 48;
            let left = rect.left + rect.width / 2 - toolbarWidth / 2;
            let top = rect.top - toolbarHeight - 10 + window.scrollY;
            
            if (left < 10) left = 10;
            if (left + toolbarWidth > window.innerWidth - 10) left = window.innerWidth - toolbarWidth - 10;
            if (top < window.scrollY + 80) top = rect.bottom + 10 + window.scrollY;
            
            highlightToolbar.style.left = left + 'px';
            highlightToolbar.style.top = top + 'px';
            highlightToolbar.classList.add('visible');
        }

        function hideHighlightToolbar() {
            highlightToolbar.classList.remove('visible');
        }

        document.querySelectorAll('.highlight-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const color = btn.dataset.color;
                const chapterId = document.querySelector('.chapter.active').dataset.chapterId;
                
                if (color === 'remove') {
                    const selection = window.getSelection();
                    if (selection.rangeCount > 0) {
                        let node = selection.anchorNode;
                        while (node && node.nodeName !== 'MARK') {
                            node = node.parentNode;
                        }
                        if (node && node.dataset.highlightId) {
                            removeHighlight(chapterId, node.dataset.highlightId);
                            renderChapter(currentChapter);
                        }
                    }
                } else {
                    addHighlight(chapterId, selectedText, color);
                    renderChapter(currentChapter);
                }
                
                hideHighlightToolbar();
                window.getSelection().removeAllRanges();
            });
        });

        function addHighlight(chapterId, text, color) {
            if (!highlights[chapterId]) {
                highlights[chapterId] = [];
            }
            
            const exists = highlights[chapterId].some(h => h.text === text && h.color === color);
            if (!exists) {
                highlights[chapterId].push({
                    id: Date.now().toString(),
                    text: text,
                    color: color,
                    timestamp: Date.now()
                });
                saveHighlights();
            }
        }

        function removeHighlight(chapterId, highlightId) {
            if (highlights[chapterId]) {
                highlights[chapterId] = highlights[chapterId].filter(h => h.id !== highlightId);
                if (highlights[chapterId].length === 0) {
                    delete highlights[chapterId];
                }
                saveHighlights();
            }
        }

        function saveHighlights() {
            localStorage.setItem('ai-agent-book-highlights', JSON.stringify(highlights));
        }

        window.addEventListener('scroll', updateProgress);
        window.addEventListener('hashchange', handleHashChange);

        function init() {
            initTheme();
            renderNav();
            
            const hash = window.location.hash.slice(1);
            const match = hash.match(/^chapter-(\d+)$/);
            if (match) {
                currentChapter = parseInt(match[1]);
                if (currentChapter < 0 || currentChapter >= chapters.length) {
                    currentChapter = 0;
                }
            }
            
            renderChapter(currentChapter);
            updateProgress();
        }

        init();
    </script>
</body>
</html>
